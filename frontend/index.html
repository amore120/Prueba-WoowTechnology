<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEMedi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:      #03080f;
        --bg2:     #060e18;
        --bg3:     #0a1628;
        --glass:   rgba(255,255,255,0.035);
        --glass2:  rgba(255,255,255,0.06);
        --border:  rgba(255,255,255,0.07);
        --border2: rgba(255,255,255,0.12);
        --cyan:    #00e5d4;
        --cyan2:   #00bfb3;
        --green:   #00f59b;
        --amber:   #ffcb47;
        --red:     #ff3f6c;
        --violet:  #a78bfa;
        --text:    #dff0f5;
        --text2:   #7a9aaa;
        --text3:   #3d5a6a;
        --font-h:  'Syne', sans-serif;
        --font-b:  'Outfit', sans-serif;
        --font-m:  'JetBrains Mono', monospace;
        --r:       14px;
        --r2:      10px;
      }
      html, body, #root { height: 100%; }
      body { background: var(--bg); color: var(--text); font-family: var(--font-b); overflow-x: hidden; }

      /* Ambient background */
      body::before {
        content: '';
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        background:
          radial-gradient(ellipse 60% 40% at 10% 0%,   rgba(0,229,212,0.07) 0%, transparent 60%),
          radial-gradient(ellipse 50% 30% at 90% 100%, rgba(0,245,155,0.05) 0%, transparent 60%),
          radial-gradient(ellipse 40% 40% at 50% 50%, rgba(167,139,250,0.03) 0%, transparent 60%),
          radial-gradient(rgba(0,229,212,0.08) 1px, transparent 1px);
        background-size: 100%, 100%, 100%, 28px 28px;
      }
      #root { position: relative; z-index: 1; }

      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,229,212,0.3); border-radius: 3px; }

      @keyframes fadeUp   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
      @keyframes spin     { to { transform: rotate(360deg); } }
      @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
      @keyframes slideIn  { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
      @keyframes glow     { 0%,100% { box-shadow:0 0 8px rgba(0,229,212,0.3); } 50% { box-shadow:0 0 20px rgba(0,229,212,0.6); } }

      input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(0.5) sepia(1) saturate(5) hue-rotate(160deg); cursor:pointer; }
      select option { background: #060e18; }
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
